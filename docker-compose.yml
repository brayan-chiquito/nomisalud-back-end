services:
  db:
    image: postgres:16-alpine
    container_name: nomisalud_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nomisalud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomisalud_password}
      POSTGRES_DB: ${POSTGRES_DB:-nomisalud_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomisalud} -d ${POSTGRES_DB:-nomisalud_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomisalud_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    name: nomisalud_postgres_data
